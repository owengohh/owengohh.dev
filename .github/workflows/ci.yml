name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Vite+
        id: cache-vite-plus
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: vite-plus-${{ runner.os }}

      - name: Install Vite+
        if: steps.cache-vite-plus.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix ~/.npm-global
          npm install -g vite-plus

      - name: Add Vite+ to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: vp test
